
<html>

<meta charset="utf-8">
</head>
<body>
<script>
pageDict = pageDict
a=词典


a.data.list.sort((a, b) => {
  // 将 createTime 转为时间戳进行比较
  return new Date(b.createTime) - new Date(a.createTime);
});

imgList = []
taskImgInfo = {}
async function getImageInfo(data,index) {


  topRightInfo = index + 1
  
  imgId = data.id
  outputId = data.outputId
  generateId = data.generateId
  imgUrl = data.originalImageUrl || data.imageUrl
  width = data.width
  height = data.height
  generateType = data.generateType
  taskParam = data.taskParam
  createTime = data.createTime

  param = data.param
  userId = data.userId

  prompt_ = param.prompt
  negativePrompt = param.negativePrompt
  metainformation = param.metainformation
  mixModels = param.mixModels
  mixModelInfo = [];
  for (let i = 0; i < mixModels.length; i++) {
    modelName = mixModels[i].modelName
    if (i == 0) {
      bottomInfo = modelName;
    };

    weight = mixModels[i].weight;
    if (weight != null) {
      mixModelInfo.push("Lora Name:" + modelName + "<br>Lora Weight:" + weight);
    } else {
      mixModelInfo.push("Checkpoint Name:" + modelName);
    };


  }
  mixModelInfo = mixModelInfo.join("<br><br>")

  imgInfo = `
<span class ='copy'>${prompt_}</span>
<br><br>
${mixModelInfo}
<br><br>
Size:${width}x${height}
<br>
GenerateId:${generateId}
<br>
GenerateType:${generateType}
<br><br>
${imgId}
`



  imgUrloSS = imgUrl+'?image_process=format,webp&x-oss-process=image/resize,w_1000,m_lfit,format,webp'

  //创建单个imgHtml
  imgHtml = `
          <div class="grid-item">
            <img class="img-content" src="${imgUrloSS}" alt="img${topRightInfo}">
            <img id="infosvg" src="">
            <div class="image-id" style="display: none;">${imgId}</div>
            <div class="image-info" style="display: none;">${imgInfo}</div>
            <div class="topRightInfo">${topRightInfo}</div>
            <div class="bottomInfo">${bottomInfo}</div>

        </div>
          `
  imgList.push(imgHtml)

  //创建单个taskImgInfoDict
  taskImgInfoDict = {
    imgId: imgId,
    outputId: outputId,
    imgUrl: imgUrl,
    width: width,
    userId: userId,
    height: height,
    prompt: prompt_,
    negativePrompt: negativePrompt,
    generateId: generateId,
    generateType: generateType,
    taskParam: taskParam,
    imgHtml: imgHtml,
    pageDict:pageDict,
    createTime:createTime
  }
  if (mixModels != null) {
    taskImgInfoDict.mixModels = mixModels;
    taskImgInfo[imgId] = taskImgInfoDict;
  } else {
    taskImgInfo[imgId]= taskImgInfoDict;
  }
  
}
dataList = a.data.list
Promise.all(dataList.map((data,index)=>getImageInfo(data,index))).then(()=>{
  result = {}
  result.imgList = imgList
  result.taskImgInfo = taskImgInfo

            const resultDiv = document.createElement('div');
            resultDiv.innerText = JSON.stringify(result, null, 2); // 格式化输出
            document.body.appendChild(resultDiv);
            console.log('所有data已处理已完成');
  console.log('所有data已处理已完成');
})
</script>
